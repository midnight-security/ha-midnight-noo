name: Create Zip on Release

on:
  workflow_dispatch:
  release:
    types: [published, edited]

jobs:
  create_zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.1

      - name: Update Version in Manifest
        if: ${{ github.event_name == 'release' && github.event.release.prerelease == false && github.event.release.draft == false }}
        run: |
          sed -i 's/\"version\"\s*\:\s*\".*\"/\"version\"\:\"${{ github.ref_name }}\"/g' ./custom_components/midnight_alerts/manifest.json

      - name: Commit & Push Version Changes
        if: ${{ github.event_name == 'release' && github.event.release.prerelease == false && github.event.release.draft == false }}
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.event.release.target_commitish }}
          message: 'Updating to version ${{ github.ref_name }}'

      - name: Create Zip
        uses: thedoctor0/zip-release@0.7.6
        with:
          type: 'zip'
          filename: 'midnight_alerts.zip'
          directory: ./custom_components/midnight_alerts

      - name: Upload Zip to Release
        if: ${{ github.event_name == 'release' }}
        uses: Roang-zero1/github-upload-release-artifacts-action@v3.0.0
        with:
          args: ./custom_components/midnight_alerts/midnight_alerts.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add Zip to Workflow Artifact
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@v4.4.3
        with:
          name: midnight_alerts
          path: ./custom_components/midnight_alerts/midnight_alerts.zip
          if-no-files-found: error
