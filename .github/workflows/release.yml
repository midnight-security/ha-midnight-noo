name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: yarn

      - run: yarn install --frozen-lockfile

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: yarn semantic-release

  build-zip:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Create Zip
        run: cd custom_components/midnight_alerts && zip -r midnight_alerts.zip . -x 'midnight_alerts.zip' -x 'vendor/alarmo/.git*' -x 'vendor/alarmo/tests/*' -x 'vendor/alarmo/screenshots/*' -x 'vendor/alarmo/.github/*' -x 'vendor/alarmo/pyproject.toml' -x 'vendor/alarmo/uv.lock' -x 'vendor/alarmo/.pre-commit-config.yaml' -x 'vendor/alarmo/pytest.ini' -x 'vendor/alarmo/DEVELOPMENT.md' -x 'vendor/alarmo/README.md' -x 'vendor/alarmo/.gitignore' -x 'vendor/alarmo/hacs.json'

      - name: Upload Zip Artifact
        uses: actions/upload-artifact@v4
        with:
          name: midnight_alerts
          path: custom_components/midnight_alerts/midnight_alerts.zip
          if-no-files-found: error
